spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/todo_think_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:a000000}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:100MB}

app:
  jwt:
    secret: ${APP_JWT_SECRET:todo-think-dev-secret-key-change-before-prod-32bytes}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:24}
  upload:
    root: ${APP_UPLOAD_ROOT:../server/uploads}
    max-file-bytes: ${APP_UPLOAD_MAX_FILE_BYTES:104857600}
    session-ttl-hours: ${APP_UPLOAD_SESSION_TTL_HOURS:24}
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:5173}
      - ${APP_CORS_ORIGIN_2:http://127.0.0.1:5173}
      - ${APP_CORS_ORIGIN_3:http://localhost:3000}
